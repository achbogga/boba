name: Release Dry Run

on:
  pull_request:
    branches:
      - main

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run:
          npx commitlint --from "$(git merge-base origin/main HEAD)" --to HEAD
          --verbose
      - run: echo "Release dry run passed."
