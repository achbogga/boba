apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: boba-cpu
spec:
  rayVersion: "2.54.0"
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
    template:
      spec:
        containers:
          - name: ray-head
            image: rayproject/ray:2.54.0-py311
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                cpu: "2"
                memory: 4Gi
  workerGroupSpecs:
    - groupName: cpu-workers
      replicas: 2
      minReplicas: 0
      maxReplicas: 4
      rayStartParams: {}
      template:
        spec:
          containers:
            - name: ray-worker
              image: rayproject/ray:2.54.0-py311
              resources:
                requests:
                  cpu: "4"
                  memory: 8Gi
                limits:
                  cpu: "4"
                  memory: 8Gi
